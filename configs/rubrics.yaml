topics:
  代刷/包榜:
    subtopics: [约定金额冲榜, 包榜代刷服务, 返利互刷, 暗语冲榜]
    low_risk: 讨论榜单玩法、正常送礼或主播运营话题，无代刷意图。
    mid_risk: 暗示冲榜、返利、互送或老规矩，但金额、时间、对象、行为证据不完整。
    high_risk: 明确约定金额、榜单位次或时间，且行为侧出现突发大额打赏或持续高频冲榜。
  色情诱导:
    subtopics: [露骨邀约, 付费色情引流, 擦边暗示, 外部私密内容交易]
    low_risk: 普通暧昧或玩笑，无露骨性内容、无交易或引流。
    mid_risk: 存在擦边暗示、私密内容试探或外部联系方式，但交易和内容不完整。
    high_risk: 明确色情服务、裸露内容交易、付费私密引流或多次诱导。
  诈骗引流:
    subtopics: [稳赚项目, 投资返利, 外部私聊引流, 批量投递]
    low_risk: 普通联系方式交换或日常项目讨论，无收益承诺、无诱导转账。
    mid_risk: 出现外部联系方式、收益暗示、批量投递迹象，但未形成完整诈骗链条。
    high_risk: 明确诱导转外部平台，并承诺收益、索取本金、押金或敏感信息。
  赌博引流:
    subtopics: [博彩平台引流, 押注跟单, 资金回血诱导, 赌博话术暗语]
    low_risk: 普通游戏、娱乐或竞猜话题，无博彩平台、押注或资金诱导。
    mid_risk: 出现走势、跟单、回血、博彩平台暗示或拉群迹象，但未明确资金往来。
    high_risk: 明确引流至博彩平台、组织押注、承诺稳赢回报或诱导充值提现。
  私下交易:
    subtopics: [平台外结算, 折扣交易, 绕过抽成, 私下收款]
    low_risk: 平台内正常消费、礼物或服务咨询。
    mid_risk: 试探私下折扣、外部结算或规避平台抽成，但未达成交易。
    high_risk: 明确平台外交易金额、收款方式、交付安排或长期绕平台交易。
  政治敏感:
    subtopics: [敏感人物, 政治谣言, 极端立场煽动, 敏感事件传播]
    low_risk: 中性新闻讨论、非煽动性表达。
    mid_risk: 涉及敏感事件或立场表达，存在传播风险但未明显煽动。
    high_risk: 明确煽动、组织、传播政治谣言或攻击敏感政治主体。
  辱骂攻击:
    subtopics: [人身攻击, 群体歧视, 威胁恐吓, 持续骚扰]
    low_risk: 轻微争吵或情绪表达，无明确侮辱和威胁。
    mid_risk: 明确辱骂、贬损、歧视或持续骚扰。
    high_risk: 严重威胁、人肉、暴力恐吓、群体仇恨或高频骚扰。
  未成年保护:
    subtopics: [未成年身份试探, 诱导私聊, 不当内容暴露, 金钱诱导]
    low_risk: 普通交流，无未成年身份或不当诱导。
    mid_risk: 出现未成年身份线索、私聊诱导或不当话题试探。
    high_risk: 明确针对未成年进行色情、金钱、外部引流或线下接触诱导。
  版权侵犯:
    subtopics: [盗播资源, 破解软件, 付费内容搬运, 账号共享]
    low_risk: 普通作品讨论或合法观看咨询。
    mid_risk: 暗示分享资源、账号或搬运内容，但未明确交易。
    high_risk: 明确售卖、传播盗版资源、破解工具或批量侵权服务。
  虚假信息:
    subtopics: [谣言传播, 虚假中奖, 冒充官方, 虚假身份]
    low_risk: 未证实信息的普通讨论，传播范围小且无诱导。
    mid_risk: 可疑虚假信息、冒充身份或诱导转发。
    high_risk: 明确冒充官方、虚假中奖、群发谣言或造成财产/安全风险。
  自伤诱导:
    subtopics: [自伤鼓励, 方法传播, 危机刺激, 求助误导]
    low_risk: 情绪低落表达或正常安慰。
    mid_risk: 出现自伤念头、方法讨论或不当刺激，但未明确鼓励执行。
    high_risk: 明确鼓励自伤、提供方法步骤、相约执行或阻止求助。
  违禁品交易:
    subtopics: [毒品, 管制器具, 黑灰产工具, 非法教程]
    low_risk: 新闻、法律或安全教育场景的中性讨论。
    mid_risk: 暗示购买、渠道、价格或规避监管。
    high_risk: 明确售卖、求购、交付、制作教程或批量交易违禁品。

